<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dụng Thần Analysis - Kỳ Môn Độn Giáp</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Lexend', 'sans-serif'],
            body: ['Be Vietnam Pro', 'sans-serif'],
          },
          colors: {
            'verdict-dai-cat': '#10b981',
            'verdict-cat': '#3b82f6',
            'verdict-binh': '#f59e0b',
            'verdict-hung': '#f97316',
            'verdict-dai-hung': '#ef4444',
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
            'progress-grow': 'progressGrow 1s ease-out forwards',
            'count-up': 'countUp 0.3s ease-out forwards',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            progressGrow: {
              '0%': { width: '0%' },
              '100%': { width: 'var(--target-width)' },
            },
            countUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    };
  </script>

  <style>
    * {
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #e8f0f8 100%);
      min-height: 100vh;
    }

    .font-heading {
      font-family: 'Lexend', sans-serif;
    }

    .logo-gradient {
      background: linear-gradient(135deg, #d4a574 0%, #e8a849 50%, #c87533 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .glassmorphism {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .card-shadow {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05), 0 2px 8px rgba(0, 0, 0, 0.03);
    }

    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.1s; }
    .stagger-3 { animation-delay: 0.15s; }
    .stagger-4 { animation-delay: 0.2s; }
    .stagger-5 { animation-delay: 0.25s; }
    .stagger-6 { animation-delay: 0.3s; }
    .stagger-7 { animation-delay: 0.35s; }
    .stagger-8 { animation-delay: 0.4s; }
    .stagger-9 { animation-delay: 0.45s; }
    .stagger-10 { animation-delay: 0.5s; }
    .stagger-11 { animation-delay: 0.55s; }
    .stagger-12 { animation-delay: 0.6s; }
    .stagger-13 { animation-delay: 0.65s; }
    .stagger-14 { animation-delay: 0.7s; }

    .progress-bar {
      transition: width 1s ease-out;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>

  <!-- React 18 CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { analysisContext } from '/src/state/analysisContext.js';
    window.__analysisContext = analysisContext;
  </script>
  <script type="text/babel" src="/public/DungThanAnalysis.jsx"></script>
</body>
</html>
